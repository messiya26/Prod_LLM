server {
    listen 80;
    server_name api.lordlomboministries.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.lordlomboministries.com;

    # SSL will be configured by certbot
    # ssl_certificate /etc/letsencrypt/live/api.lordlomboministries.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.lordlomboministries.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /opt/llm-api/apps/api/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
