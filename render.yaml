services:
  - type: web
    name: llm-api
    runtime: node
    region: ohio
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "4000"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://lordlomboministries.com
      - key: NODE_ENV
        value: production
