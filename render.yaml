services:
  - type: web
    name: llm-api
    runtime: node
    region: ohio
    rootDir: apps/api
    buildCommand: npm install --include=dev && npx prisma generate && npx tsc
    startCommand: npx prisma db push --skip-generate --accept-data-loss && node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
